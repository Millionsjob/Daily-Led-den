<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest & Earn</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background:#f5f7fb;
}

header{
background:linear-gradient(180deg,#1976d2,#42a5f5);
color:white;
padding:20px;
text-align:center;
}

header h1{
margin:0;
font-size:24px;
}

.container{
padding:15px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.flex{
display:flex;
gap:10px;
}

.flex .card{
flex:1;
text-align:center;
}

.button{
background:#1976d2;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
font-size:16px;
}

.button:hover{
background:#0d47a1;
}

.banner{
background:url('banner.jpg');
background-size:cover;
background-position:center;
height:150px;
border-radius:12px;
display:flex;
align-items:end;
padding:10px;
color:white;
font-weight:bold;
}

.loan-card{
border:1px solid #ddd;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.footer div{
text-align:center;
font-size:12px;
}

</style>

</head>
<body>

<header>

<h1>INVEST MORE EARN MORE</h1>

</header>

<div class="container">


<div class="flex">

<div class="card">

<h3>Live Loans</h3>

<p>₹ 23,250</p>

</div>

<div class="card">

<h3>Lumpsum</h3>

<p>₹ 12,500</p>

</div>

</div>


<div class="card banner">

Earn XIRR Up to 24%

</div>


<div class="card">

<h3>Lending Options</h3>

<button class="button">Start Lending</button>

</div>


<div class="card">

<h3>Available Loans</h3>

<div class="loan-card">

<p><b>Short Term</b></p>

<p>Return: 12%</p>

<p>Duration: 3 Months</p>

</div>

<div class="loan-card">

<p><b>Mid Term</b></p>

<p>Return: 18%</p>

<p>Duration: 6 Months</p>

</div>

</div>


<div class="card">

<h3>Trusted & Highly Rated</h3>

<p>₹18,300 Cr Invested</p>

<p>4.8 ★ Rating</p>

</div>


</div>


<div class="footer">

<div>Home</div>

<div>Explore</div>

<div>Invest</div>

<div>Profile</div>

</div>


<script>

function startInvest(){

alert("Invest button clicked");

}

</script>


</body>
</html>
